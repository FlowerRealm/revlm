# Install once after clone:
#   bash scripts/install-git-hooks.sh
# Or: pre-commit install --hook-type pre-commit --hook-type pre-push

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^(backend|cpp)/

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bash -c 'npm --prefix frontend exec -- prettier --write "$@"' --
        language: system
        files: ^frontend/
        exclude: ^frontend/(dist/|public/vendor/|public/assets/|\.gitignore$|.*\.svg$)

      - id: eslint
        name: eslint
        entry: npm --prefix frontend run lint
        language: system
        files: ^frontend/.*\.[jt]sx?$
        pass_filenames: false

      - id: frontend-tsc
        name: frontend typecheck
        entry: npm --prefix frontend run typecheck
        language: system
        files: ^frontend/
        pass_filenames: false
        stages: [pre-push]
