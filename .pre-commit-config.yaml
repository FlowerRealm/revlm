repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^(backend|cpp)/

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bash -c 'npm --prefix frontend exec -- prettier --write "$@"' --
        language: system
        files: ^frontend/
        exclude: ^frontend/(dist/|public/vendor/|public/assets/|\.gitignore$|.*\.svg$)
