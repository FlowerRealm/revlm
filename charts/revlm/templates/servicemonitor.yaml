{{- if .Values.serviceMonitor.enabled }}
{{- $ctx := . }}
{{- range $name, $_ := .Values.components }}
{{- $merged := fromYaml (include "revlm.componentMerged" (dict "name" $name "ctx" $ctx)) -}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "revlm.componentFullname" (dict "name" $name "ctx" $ctx) }}
  labels:
    {{- include "revlm.componentLabels" (dict "name" $name "ctx" $ctx) | nindent 4 }}
spec:
  endpoints:
    - interval: 30s
      path: /metrics
      port: http
  namespaceSelector:
    matchNames:
      - {{ $ctx.Release.Namespace }}
  selector:
    matchLabels:
      {{- include "revlm.componentSelectorLabels" (dict "name" $name "ctx" $ctx) | nindent 6 }}
{{- end }}
{{- end }}
