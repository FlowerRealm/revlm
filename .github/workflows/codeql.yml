name: codeql

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 16:00 UTC is 00:00 Asia/Shanghai.
    - cron: "0 16 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Install C++ dependencies
        if: matrix.language == 'c-cpp'
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y libssl-dev libcpp-httplib-dev libboost-json-dev libboost-url-dev
          ODB_DISTRO=ubuntu24.04 bash .github/scripts/install-odb.sh

      - name: Build
        if: matrix.language == 'c-cpp'
        run: |
          set -euo pipefail

          cmake -S . -B build/backend -DCMAKE_BUILD_TYPE=Release
          cmake --build build/backend -j"$(nproc)"

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          upload: never
          category: "/language:${{ matrix.language }}"

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: ${{ steps.analyze.outputs.sarif-output }}
          if-no-files-found: error
          retention-days: 14
