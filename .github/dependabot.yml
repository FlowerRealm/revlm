version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: deps
